<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | White Water Rafting Co.</title>
  <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or trip planning.">
  <meta name="author" content="Magdalene Shehu">
  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<header>
  <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="trips.html">Trips</a>
    <a href="contact.html">Contact Us</a>
  </nav>
</header>

<main>
  <h1>Contact Us | White Water Rafting Co.</h1>

  <!-- MAP -->
  <section>
    <h2>Our Location</h2>
    <iframe 
      src="https://maps.google.com/maps?q=Abuja%20Nigeria&t=&z=13&ie=UTF8&iwloc=&output=embed"
      width="100%" 
      height="300"
      loading="lazy"
      title="Map showing Abuja Nigeria location">
    </iframe>
  </section>

  <!-- TEAM -->
  <section class="employees">
    <h2>Meet Our Team</h2>

    <figure>
      <img src="images/mary.jpeg" alt="Mary, Trip Coordinator">
      <figcaption>Mary - Trip Coordinator</figcaption>
    </figure>

    <figure>
      <img src="images/john.jpeg" alt="John, Lead River Guide">
      <figcaption>John - Lead River Guide</figcaption>
    </figure>

    <figure>
      <img src="images/alex.jpeg" alt="Alex, Safety Officer">
      <figcaption>Alex - Safety Officer</figcaption>
    </figure>
  </section>

  <!-- FORM -->
  <section>
    <h2>Send Us a Message</h2>

    <form>
      <label for="name">Full Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email:</label>
      <input type="text" id="email" name="email" required>

      <p>Purpose of Message:</p>

      <label for="general">
        <input type="radio" id="general" name="purpose" value="general" required>
        General Inquiry
      </label>

      <label for="reservation">
        <input type="radio" id="reservation" name="purpose" value="reservation">
        Reservation
      </label>

      <label for="question">
        <input type="radio" id="question" name="purpose" value="question">
        Question
      </label>

      <label for="message">Message:</label>
      <textarea id="message" name="message" required></textarea>

      <label for="subscribe">
        <input type="checkbox" id="subscribe" name="subscribe">
        Subscribe to newsletter
      </label>

      <button type="submit">Send Message</button>
    </form>
  </section>

</main>

<footer>
  <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>

  <nav class="socialmedia">
    <a href="#"><img src="images/facebook.svg" alt="Visit our Facebook page"></a>
    <a href="#"><img src="images/linkedin.svg" alt="Visit our LinkedIn page"></a>
    <a href="#"><img src="images/instagram.svg" alt="Visit our Instagram page"></a>
  </nav>
</footer>

</body>
        </html>
