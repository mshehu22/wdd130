<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Magdalene Shehu">
    <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or suggestions.">
    <title>Contact Us - White Water Rafting Co.</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/z-raftingbw.png" alt="White Water Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us - White Water Rafting Co.</h1>

        <img src="images/contact-rafting.jpg" alt="Rafting Adventure Contact Image">

        <form action="#" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="text" id="email" name="email" required>

            <p>Trip Preference:</p>
            <input type="radio" id="beginner" name="trip-choice" value="beginner">
            <label for="beginner">Beginner</label>

            <input type="radio" id="intermediate" name="trip-choice" value="intermediate">
            <label for="intermediate">Intermediate</label>

            <input type="radio" id="advanced" name="trip-choice" value="advanced">
            <label for="advanced">Advanced</label>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <input type="checkbox" id="subscribe" name="subscribe">
            <label for="subscribe">Subscribe to our newsletter</label>

            <button type="submit">Send Message</button>
        </form>
    </main>

    <footer>
        <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.svg" alt="Facebook social media link"></a>
            <a href="#"><img src="images/linkedin.svg" alt="LinkedIn social media link"></a>
            <a href="#"><img src="images/instagram.svg" alt="Instagram social media link"></a>
        </nav>
    </footer>
</body>
                </html>
