<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or suggestions.">
    <meta name="author" content="Magdalene Shehu">
    <title>Contact Us - White Water Rafting Co.</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/z-raftingbw.png" alt="White Water Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us - White Water Rafting Co.</h1>

        <div class="contact-form">
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name">

                <label>Preferred Contact Method:</label>
                <input type="radio" id="contact-email" name="contact-method">
                <label for="contact-email">Email</label>

                <input type="radio" id="contact-phone" name="contact-method">
                <label for="contact-phone">Phone</label>

                <input type="radio" id="contact-none" name="contact-method">
                <label for="contact-none">No Preference</label>

                <label for="message">Message:</label>
                <textarea id="message" name="message"></textarea>

                <input type="checkbox" id="subscribe" name="subscribe">
                <label for="subscribe">Subscribe to newsletter</label>

                <button type="submit">Send Message</button>
            </form>
        </div>

        <div class="employees">
            <h2>Our Team</h2>
            <ul>
                <li>John - Lead River Guide</li>
                <li>Mary - Trip Coordinator</li>
                <li>Alex - Safety Officer</li>
            </ul>
        </div>

        <div class="map">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d387190.2799145922!2d-74.25987568727693!3d40.697670068157!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c24fa5d33f083b%3A0xf4f2a99e4c86f16!2sNew%20York%2C%20NY%2C%20USA!5e0!3m2!1sen!2s!4v1588765548422!5m2!1sen!2s" 
                id="map-iframe" 
                allowfullscreen="" 
                loading="lazy">
            </iframe>
        </div>
    </main>

    <footer>
        <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.svg" alt="Facebook social media link"></a>
            <a href="#"><img src="images/linkedin.svg" alt="LinkedIn social media link"></a>
            <a href="#"><img src="images/instagram.svg" alt="Instagram social media link"></a>
        </nav>
    </footer>
</body>
</html>
