<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | White Water Rafting Co.</title>
  <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or trip planning.">
  <meta name="author" content="Magdalene Shehu">
  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<header>
  <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="trips.html">Trips</a>
    <a href="contact.html">Contact Us</a>
  </nav>
</header>

<main>

  <h1>Contact Us</h1>

  <!-- ✅ COMPANY INFO -->
  <section class="contact-info">
    <h2>Our Office</h2>
    <p><strong>Address:</strong> Abuja, Nigeria</p>
    <p><strong>Phone:</strong> +234 123 456 789</p>
    <p><strong>Email:</strong> info@rafting.com</p>
  </section>

  <!-- ✅ MAP -->
  <section class="map">
    <iframe
      src="https://maps.google.com/maps?q=Abuja%20Nigeria&output=embed"
      loading="lazy"
      title="Location map of White Water Rafting Co.">
    </iframe>
  </section>

  <!-- ✅ EMPLOYEES -->
  <section class="employees">
    <h2>Meet Our Team</h2>

    <div class="employee-grid">
      <figure>
        <img src="images/mary.jpeg" alt="Mary, Trip Coordinator">
        <figcaption>Mary - Trip Coordinator</figcaption>
      </figure>

      <figure>
        <img src="images/john.jpeg" alt="John, Lead River Guide">
        <figcaption>John - Lead River Guide</figcaption>
      </figure>

      <figure>
        <img src="images/alex.jpeg" alt="Alex, Safety Officer">
        <figcaption>Alex - Safety Officer</figcaption>
      </figure>
    </div>
  </section>

  <!-- ✅ FORM -->
  <section class="contact-form">
    <h2>Send Us a Message</h2>

    <form>

      <label for="fullname">Full Name:</label>
      <input type="text" id="fullname" name="fullname" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <p>Purpose of Message:</p>

      <label>
        <input type="radio" name="purpose" value="general" required>
        General Inquiry
      </label>

      <label>
        <input type="radio" name="purpose" value="reservation">
        Reservation Question
      </label>

      <label>
        <input type="radio" name="purpose" value="suggestion">
        Website Suggestion
      </label>

      <label for="message">Message:</label>
      <textarea id="message" name="message" required></textarea>

      <label>
        <input type="checkbox" name="subscribe">
        Please subscribe me to the monthly newsletter
      </label>

      <button type="submit">Send Message</button>

    </form>
  </section>

</main>

<footer>
  <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>

  <nav class="socialmedia">
    <a href="#"><img src="images/facebook.svg" alt="Visit our Facebook page"></a>
    <a href="#"><img src="images/linkedin.svg" alt="Visit our LinkedIn page"></a>
    <a href="#"><img src="images/instagram.svg" alt="Visit our Instagram page"></a>
  </nav>
</footer>

</body>
  </html>
