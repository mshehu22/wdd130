<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or suggestions.">
    <title>Contact Us - White Water Rafting Co.</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/z-raftingbw.png" alt="White Water Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <h1>Contact Us - White Water Rafting Co.</h1>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name">

            <label for="email">Email:</label>
            <input type="text" id="email" name="email">

            <p>Preferred Trip Level:</p>
            <label><input type="radio" name="trip-level" value="beginner"> Beginner</label>
            <label><input type="radio" name="trip-level" value="intermediate"> Intermediate</label>
            <label><input type="radio" name="trip-level" value="advanced"> Advanced</label>

            <label for="message">Message:</label>
            <textarea id="message" name="message"></textarea>

            <label><input type="checkbox" name="newsletter"> Subscribe to newsletter</label>

            <button type="submit">Send Message</button>
        </form>
    </main>
    <footer>
        <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.svg" alt="Facebook social media link"></a>
            <a href="#"><img src="images/linkedin.svg" alt="LinkedIn social media link"></a>
            <a href="#"><img src="images/instagram.svg" alt="Instagram social media link"></a>
        </nav>
    </footer>
</body>
