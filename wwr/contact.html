<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - White Water Rafting Co.</title>
    <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or suggestions.">
    <meta name="author" content="Magdalene Shehu">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/z-raftingbw.png" alt="White Water Rafting Logo" width="150">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us - White Water Rafting Co.</h1>

        <section class="company-info">
            <p>White Water Rafting Co.</p>
            <p>123 Adventure Lane, Bauchi, Nigeria</p>
            <p>Phone: +234 800 123 4567</p>
            <p>Email: info@wwraftingco.com</p>
        </section>

        <section class="map">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3922.123456789!2d9.8295!3d10.3112!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x11b68b3d25a2e1d3%3A0x123456789abcdef!2sBauchi!5e0!3m2!1sen!2sng!4v1234567890123" 
                width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
                title="Bauchi location map"></iframe>
        </section>

        <section class="contact-form">
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <p>Purpose:</p>
                <input type="radio" id="question" name="purpose" value="question" required>
                <label for="question">Question</label>

                <input type="radio" id="reservation" name="purpose" value="reservation">
                <label for="reservation">Reservation</label>

                <input type="radio" id="feedback" name="purpose" value="feedback">
                <label for="feedback">Feedback</label>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="4" required></textarea>

                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>

                <button type="submit" style="background-color:#276033; color:white;">Send Message</button>
            </form>
        </section>

        <section class="employees">
            <h2>Meet Our Team</h2>
            <div class="employee">
                <img src="https://via.placeholder.com/150" alt="John - Lead River Guide">
                <figcaption>John - Lead River Guide</figcaption>
            </div>
            <div class="employee">
                <img src="https://via.placeholder.com/150" alt="Mary - Trip Coordinator">
                <figcaption>Mary - Trip Coordinator</figcaption>
            </div>
            <div class="employee">
                <img src="https://via.placeholder.com/150" alt="Alex - Safety Officer">
                <figcaption>Alex - Safety Officer</figcaption>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.svg" alt="Facebook social media link"></a>
            <a href="#"><img src="images/linkedin.svg" alt="LinkedIn social media link"></a>
            <a href="#"><img src="images/instagram.svg" alt="Instagram social media link"></a>
        </nav>
    </footer>
</body>
    </html>
