<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us | White Water Rafting Co.</title>

    <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or trip planning.">
    <meta name="author" content="Magdalene Shehu">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<header>
    <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="trips.html">Trips</a>
        <a href="contact.html">Contact Us</a>
    </nav>
</header>

<main>

    <h1>Contact White Water Rafting Co.</h1>

    <!-- TEAM SECTION (REQUIRED IMAGES FIX) -->
    <section class="employees">

        <h2>Meet Our Team</h2>

        <figure>
            <img src="images/john.jpeg" alt="John, Lead River Guide">
            <figcaption>John - Lead River Guide</figcaption>
        </figure>

        <figure>
            <img src="images/mary.jpeg" alt="Mary, Trip Coordinator">
            <figcaption>Mary - Trip Coordinator</figcaption>
        </figure>

        <figure>
            <img src="images/alex.jpeg" alt="Alex, Safety Officer">
            <figcaption>Alex - Safety Officer</figcaption>
        </figure>

    </section>

    <!-- CONTACT FORM -->
    <form action="#" method="post">

        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname">

        <label for="email">Email:</label>
        <input type="text" id="email" name="email">

        <p>Choose your trip type:</p>

        <label>
            <input type="radio" name="trip" value="basic"> Basic Rafting
        </label>

        <label>
            <input type="radio" name="trip" value="adventure"> Adventure Rafting
        </label>

        <label>
            <input type="radio" name="trip" value="extreme"> Extreme Rafting
        </label>

        <label for="message">Message:</label>
        <textarea id="message" name="message"></textarea>

        <label>
            <input type="checkbox" name="newsletter">
            Subscribe to newsletter
        </label>

        <button type="submit">Send Message</button>

    </form>

</main>

<footer>

    <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>

    <nav class="socialmedia">
        <a href="https://facebook.com">
            <img src="images/facebook.svg" alt="Visit our Facebook page">
        </a>

        <a href="https://linkedin.com">
            <img src="images/linkedin.svg" alt="Visit our LinkedIn page">
        </a>

        <a href="https://instagram.com">
            <img src="images/instagram.svg" alt="Visit our Instagram page">
        </a>
    </nav>

</footer>

</body>
            </html>
