<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting Co.</title>
    <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or trip planning.">
    <meta name="author" content="Magdalene Shehu">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <h1>Contact Us | White Water Rafting Co.</h1>
        <form action="#" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="text" id="email" name="email" required>

            <fieldset>
                <legend>How can we help you?</legend>
                <input type="radio" id="question" name="reason" value="question">
                <label for="question">Question</label>

                <input type="radio" id="reservation" name="reason" value="reservation">
                <label for="reservation">Reservation</label>

                <input type="radio" id="feedback" name="reason" value="feedback">
                <label for="feedback">Feedback</label>
            </fieldset>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <input type="checkbox" id="subscribe" name="subscribe">
            <label for="subscribe">Subscribe to our newsletter</label>

            <button type="submit">Send Message</button>
        </form>

        <section class="team">
            <h2>Meet Our Team</h2>
            <img src="images/mary.jpeg" alt="Mary, Trip Coordinator">
            <img src="images/john.jpeg" alt="John, Lead River Guide">
            <img src="images/alex.jpeg" alt="Alex, Safety Officer">
        </section>
    </main>
    <footer>
        <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.svg" alt="Facebook social media link"></a>
            <a href="#"><img src="images/linkedin.svg" alt="LinkedIn social media link"></a>
            <a href="#"><img src="images/instagram.svg" alt="Instagram social media link"></a>
        </nav>
    </footer>
</body>
                            </html>
