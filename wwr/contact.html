<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or trip planning.">
    <meta name="author" content="Magdalene Shehu">
    <title>Contact Us | White Water Rafting Co.</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us</h1>

        <section class="contact-info">
            <h2>Our Team</h2>
            <div class="team">
                <figure>
                    <img src="images/mary.jpeg" alt="Mary, Trip Coordinator">
                    <figcaption>MARY - Trip Coordinator</figcaption>
                </figure>
                <figure>
                    <img src="images/john.jpeg" alt="John, Lead River Guide">
                    <figcaption>JOHN - Lead River Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/alex.jpeg" alt="Alex, Safety Officer">
                    <figcaption>ALEX - Safety Officer</figcaption>
                </figure>
            </div>
        </section>

        <section class="contact-form">
            <h2>Send Us a Message</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Your full name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>

                <p>Trip Preference:</p>
                <label><input type="radio" id="family" name="trip" value="family" required> Family Adventure</label>
                <label><input type="radio" id="whitewater" name="trip" value="whitewater"> Whitewater Challenge</label>
                <label><input type="radio" id="sunset" name="trip" value="sunset"> Sunset Float</label>

                <label for="message">Message:</label>
                <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>

                <label><input type="checkbox" id="subscribe" name="subscribe"> Subscribe to newsletter</label>

                <button type="submit">Send Message</button>
            </form>
        </section>

        <section class="location">
            <h2>Find Us</h2>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!..." width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Map to White Water Rafting Co."></iframe>
        </section>
    </main>

    <footer>
        <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.svg" alt="Facebook social media link"></a>
            <a href="https://linkedin.com"><img src="images/linkedin.svg" alt="LinkedIn social media link"></a>
            <a href="https://instagram.com"><img src="images/instagram.svg" alt="Instagram social media link"></a>
        </nav>
    </footer>
</body>
                    </html>
