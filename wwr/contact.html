<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting Co.</title>
    <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or trip planning.">
    <meta name="author" content="Magdalene Shehu">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us | White Water Rafting Co.</h1>

        <form action="#" method="post">
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" required>

            <label for="email">Email:</label>
            <input type="text" id="email" name="email" required>

            <p>Trip Type:</p>
            <label for="beginner">
                <input type="radio" name="trip" id="beginner" value="beginner" required> Beginner
            </label>
            <label for="intermediate">
                <input type="radio" name="trip" id="intermediate" value="intermediate"> Intermediate
            </label>
            <label for="advanced">
                <input type="radio" name="trip" id="advanced" value="advanced"> Advanced
            </label>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <label for="subscribe">
                <input type="checkbox" id="subscribe" name="subscribe"> Subscribe to our newsletter
            </label>

            <button type="submit">Send Message</button>
        </form>

        <section class="map-container">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!..." 
                class="map"
                allowfullscreen
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </section>
    </main>

    <footer>
        <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.svg" alt="Facebook social media link"></a>
            <a href="#"><img src="images/linkedin.svg" alt="LinkedIn social media link"></a>
            <a href="#"><img src="images/instagram.svg" alt="Instagram social media link"></a>
        </nav>
    </footer>
</body>
                </html>
