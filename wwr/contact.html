<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting Co.</title>
    <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or trip planning.">
    <meta name="author" content="Magdalene Shehu">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us | White Water Rafting Co.</h1>
        
        <form action="#" method="post">
            <!-- Name -->
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <!-- Email -->
            <label for="email">Email:</label>
            <input type="text" id="email" name="email" required>

            <!-- Trip Level Radio Buttons -->
            <p>Choose your trip level:</p>
            <label for="beginner">
                <input type="radio" id="beginner" name="trip" value="beginner" required> Beginner
            </label>
            <label for="intermediate">
                <input type="radio" id="intermediate" name="trip" value="intermediate"> Intermediate
            </label>
            <label for="advanced">
                <input type="radio" id="advanced" name="trip" value="advanced"> Advanced
            </label>

            <!-- Message -->
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <!-- Subscribe Checkbox -->
            <label for="subscribe">
                <input type="checkbox" id="subscribe" name="subscribe"> Subscribe to newsletter
            </label>

            <!-- Submit Button -->
            <button type="submit">Send Message</button>
        </form>

        <!-- Map -->
        <iframe class="map" src="https://www.google.com/maps/embed?pb=..." allowfullscreen="" loading="lazy"></iframe>
    </main>

    <footer>
        <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.svg" alt="Facebook social media link"></a>
            <a href="#"><img src="images/linkedin.svg" alt="LinkedIn social media link"></a>
            <a href="#"><img src="images/instagram.svg" alt="Instagram social media link"></a>
        </nav>
    </footer>
</body>
                </html>
