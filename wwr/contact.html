<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact Us | White Water Rafting Co.</title>

  <meta name="description" content="Contact White Water Rafting Co. for reservations, trip planning, safety inquiries and general support.">
  <meta name="author" content="Magdalene Shehu">

  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<header>
  <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="trips.html">Trips</a>
    <a href="contact.html">Contact Us</a>
  </nav>
</header>

<main>

<h1>Contact White Water Rafting Co.</h1>

<!-- COMPANY INFO + MAP -->
<section class="company-info">

  <h2>Company Information</h2>

  <p><strong>Address:</strong> 123 River Road, Adventure City</p>
  <p><strong>Phone:</strong> +234 800 000 0000</p>
  <p><strong>Email:</strong> info@whitewaterrafting.com</p>

  <iframe
    src="https://www.google.com/maps?q=abuja&output=embed"
    width="100%"
    height="300"
    loading="lazy">
  </iframe>

</section>

<!-- EMPLOYEES -->
<section class="employees">

  <h2>Our Team</h2>

  <figure>
    <img src="images/john.jpeg" alt="John - Senior River Guide">
    <figcaption>John - Senior River Guide</figcaption>
  </figure>

  <figure>
    <img src="images/mary.jpeg" alt="Mary - Safety Coordinator">
    <figcaption>Mary - Safety Coordinator</figcaption>
  </figure>

  <figure>
    <img src="images/alex.jpeg" alt="Alex - Tour Manager">
    <figcaption>Alex - Tour Manager</figcaption>
  </figure>

</section>

<!-- CONTACT FORM -->
<section class="contact-form">

<h2>Send Us a Message</h2>

<form>

  <label for="fullname">Full Name</label>
  <input type="text" id="fullname" name="fullname">

  <label for="email">Email Address</label>
  <input type="email" id="email" name="email">

  <p>Preferred Contact Method</p>

  <input type="radio" id="emailradio" name="contact_method" value="email">
  <label for="emailradio">Email</label>

  <input type="radio" id="phoneradio" name="contact_method" value="phone">
  <label for="phoneradio">Phone</label>

  <input type="radio" id="textradio" name="contact_method" value="text">
  <label for="textradio">Text Message</label>

  <label for="message">Message</label>
  <textarea id="message" name="message"></textarea>

  <input type="checkbox" id="subscribe" name="subscribe">
  <label for="subscribe">Subscribe to trip updates</label>

  <button type="submit">Send Enquiry to Team</button>

</form>

</section>

</main>

<footer>

  <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>

  <nav class="socialmedia">
    <a href="https://facebook.com"><img src="images/facebook.svg" alt="Facebook"></a>
    <a href="https://linkedin.com"><img src="images/linkedin.svg" alt="LinkedIn"></a>
    <a href="https://instagram.com"><img src="images/instagram.svg" alt="Instagram"></a>
  </nav>

</footer>

</body>
</html>
