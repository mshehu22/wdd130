<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - White Water Rafting Co.</title>
    <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or suggestions.">
    <meta name="author" content="Magdalene Shehu">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/z-raftingbw.png" alt="White Water Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us - White Water Rafting Co.</h1>
        
        <form action="#" method="post">
            <!-- Name -->
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>

            <!-- Email -->
            <label for="email">Email Address:</label>
            <input type="text" id="email" name="email" required>

            <!-- Inquiry Type -->
            <p>Type of Inquiry:</p>
            <input type="radio" id="question" name="inquiry" value="question" required>
            <label for="question">Question</label>
            <input type="radio" id="reservation" name="inquiry" value="reservation" required>
            <label for="reservation">Reservation</label>
            <input type="radio" id="suggestion" name="inquiry" value="suggestion" required>
            <label for="suggestion">Suggestion</label>

            <!-- Message -->
            <label for="message">Your Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <!-- Subscribe -->
            <input type="checkbox" id="subscribe" name="subscribe">
            <label for="subscribe">Subscribe to newsletter</label>

            <!-- Submit -->
            <button type="submit">Send Message</button>
        </form>

        <section class="employees">
            <h2>Meet Our Team</h2>
            <p>John - Lead River Guide</p>
            <p>Mary - Trip Coordinator</p>
            <p>Alex - Safety Officer</p>
        </section>
    </main>

    <footer>
        <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.svg" alt="Facebook social media link"></a>
            <a href="#"><img src="images/linkedin.svg" alt="LinkedIn social media link"></a>
            <a href="#"><img src="images/instagram.svg" alt="Instagram social media link"></a>
        </nav>
    </footer>
</body>
                </html>
