<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or trip planning.">
  <meta name="author" content="Magdalene Shehu">
  <title>Contact Us | White Water Rafting Co.</title>
  <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
  <header>
    <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="trips.html">Trips</a>
      <a href="contact.html">Contact Us</a>
    </nav>
  </header>

  <main>
    <h1>Contact Us | White Water Rafting Co.</h1>

    <section class="contact-form">
      <form action="#" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <fieldset>
          <legend>Trip Type:</legend>
          <label><input type="radio" id="family" name="trip" value="Family" required> Family</label>
          <label><input type="radio" id="adventure" name="trip" value="Adventure"> Adventure</label>
          <label><input type="radio" id="extreme" name="trip" value="Extreme"> Extreme</label>
        </fieldset>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <label><input type="checkbox" id="newsletter" name="newsletter"> Subscribe to newsletter</label>

        <button type="submit">Send Message</button>
      </form>
    </section>

    <section class="contact-map">
      <h2>Our Location</h2>
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d387190.2799148859!2d-74.25986556308811!3d40.69767006351783!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c24fa5d33f083b%3A0x4a7f3b86dc2d9f0!2sNew%20York%2C%20NY%2C%20USA!5e0!3m2!1sen!2sng!4v1700000000000!5m2!1sen!2sng"
        width="600"
        height="450"
        style="border:0;"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        title="White Water Rafting Co. Location">
      </iframe>
    </section>
  </main>

  <footer>
    <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>
    <nav class="socialmedia">
      <a href="#"><img src="images/facebook.svg" alt="Facebook social media link"></a>
      <a href="#"><img src="images/linkedin.svg" alt="LinkedIn social media link"></a>
      <a href="#"><img src="images/instagram.svg" alt="Instagram social media link"></a>
    </nav>
  </footer>
</body>
</html>
