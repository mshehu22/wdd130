<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or suggestions.">
    <meta name="author" content="Magdalene Shehu">
    <title>Contact Us - White Water Rafting Co.</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/z-raftingbw.png" alt="White Water Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us - White Water Rafting Co.</h1>

        <section class="contact-form">
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Your name">

                <label for="email">Email:</label>
                <input type="text" id="email" name="email" placeholder="Your email">

                <p>Preferred Contact Method:</p>
                <label><input type="radio" name="contact-method" value="email"> Email</label>
                <label><input type="radio" name="contact-method" value="phone"> Phone</label>
                <label><input type="radio" name="contact-method" value="inperson"> In Person</label>

                <label for="message">Message:</label>
                <textarea id="message" name="message" placeholder="Your message"></textarea>

                <label><input type="checkbox" name="subscribe" id="subscribe"> Subscribe to our newsletter</label>

                <button type="submit">Send Message</button>
            </form>
        </section>

        <section class="employees">
            <h2>Meet Our Team</h2>
            <ul>
                <li>John – Lead River Guide</li>
                <li>Mary – Trip Coordinator</li>
                <li>Alex – Safety Officer</li>
            </ul>
        </section>

        <section class="map">
            <h2>Our Location</h2>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.086797603615!2d-122.42067968468128!3d37.77492977975945!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8085809c1f2b90e7%3A0xe0e0c0a1f7de7d5a!2sAdventure%20City%20Riverbank!5e0!3m2!1sen!2sus!4v1610000000000!5m2!1sen!2sus"
                width="600"
                height="450"
                style="border:0;"
                allowfullscreen=""
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </section>
    </main>

    <footer>
        <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.svg" alt="Facebook social media link"></a>
            <a href="#"><img src="images/linkedin.svg" alt="LinkedIn social media link"></a>
            <a href="#"><img src="images/instagram.svg" alt="Instagram social media link"></a>
        </nav>
    </footer>
</body>
                    </html>
