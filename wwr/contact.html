<head>
  <meta charset="utf-8">

  <meta name="description" content="Contact White Water Rafting Company.">
  <meta name="author" content="mshehu22">
  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<header>
  <img src="images/logo.png" alt="White Water Rafting Company logo">
  <h1>White Water Rafting Company</h1>

  <nav>
    <ul class="navigation">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="trips.html">Trips</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </nav>
</header>

<main>

<h1>Contact White Water Rafting Co.</h1>

<!-- EMPLOYEES -->
<section class="employees">

  <figure>
    <img src="images/john.jpeg" alt="John - Senior River Guide">
    <figcaption>John - Senior River Guide</figcaption>
  </figure>

  <figure>
    <img src="images/mary.jpeg" alt="Mary - Safety Coordinator">
    <figcaption>Mary - Safety Coordinator</figcaption>
  </figure>

  <figure>
    <img src="images/alex.jpeg" alt="Alex - Tour Manager">
    <figcaption>Alex - Tour Manager</figcaption>
  </figure>

</section>

<!-- CONTACT FORM -->
<section class="contact-form">
  <form>

    <label for="name">Full Name:</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email Address:</label>
    <input type="email" id="email" name="email" required>

    <p>Purpose of Message:</p>

    <label><input type="radio" name="purpose" value="general"> General Inquiry</label>
    <label><input type="radio" name="purpose" value="reservation"> Reservation</label>
    <label><input type="radio" name="purpose" value="feedback"> Feedback</label>

    <label for="message">Message:</label>
    <textarea id="message" name="message"></textarea>

    <label>
      <input type="checkbox" name="subscribe">
      Subscribe to newsletter
    </label>

    <button type="submit" class="btn">Send Message</button>

  </form>
</section>

</main>

<footer>
  <p>© 2026 White Water Rafting Co. | mshehu22</p>
</footer>

</body>
        </html>
