<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact Us | White Water Rafting Co.</title>

  <meta name="description" content="Contact White Water Rafting Co. for reservations, trip planning, safety inquiries and customer support.">
  <meta name="author" content="Magdalene Shehu">

  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

  <header>
    <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">

    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="trips.html">Trips</a>
      <a href="contact.html">Contact Us</a>
    </nav>
  </header>

  <main>
    <h1>Contact White Water Rafting Co.</h1>

    <form>

      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" name="fullname">

      <p>Preferred Contact Method</p>

      <label>
        <input type="radio" name="contact_method" value="email">
        Email
      </label>

      <label>
        <input type="radio" name="contact_method" value="phone">
        Phone
      </label>

      <label>
        <input type="radio" name="contact_method" value="text">
        Text Message
      </label>

      <label for="message">Message</label>
      <textarea id="message" name="message"></textarea>

      <label>
        <input type="checkbox" id="subscribe" name="subscribe">
        Subscribe to trip updates
      </label>

      <button type="submit">Send Inquiry</button>

    </form>
  </main>

  <footer>
    <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>

    <nav class="socialmedia">
      <a href="https://facebook.com">
        <img src="images/facebook.svg" alt="Visit our Facebook page">
      </a>

      <a href="https://linkedin.com">
        <img src="images/linkedin.svg" alt="Visit our LinkedIn page">
      </a>

      <a href="https://instagram.com">
        <img src="images/instagram.svg" alt="Visit our Instagram page">
      </a>
    </nav>
  </footer>

</body>
        </html>
