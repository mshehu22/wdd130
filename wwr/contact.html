<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or trip planning.">
  <meta name="author" content="Magdalene Shehu">
  <title>Contact Us | White Water Rafting Co.</title>
  <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>

  <header>
    <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="trips.html">Trips</a>
      <a href="contact.html">Contact Us</a>
    </nav>
  </header>

  <main>
    <h1>Contact Us | White Water Rafting Co.</h1>

    <section class="staff">
      <div class="staff-member">
        <img src="images/mary.jpeg" alt="Mary, Trip Coordinator">
        <p>Mary – Trip Coordinator</p>
      </div>
      <div class="staff-member">
        <img src="images/john.jpeg" alt="John, Lead River Guide">
        <p>John – Lead River Guide</p>
      </div>
      <div class="staff-member">
        <img src="images/alex.jpeg" alt="Alex, Safety Officer">
        <p>Alex – Safety Officer</p>
      </div>
    </section>

    <section class="contact-form">
      <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Your Name" required>

        <label for="email">Email:</label>
        <input type="text" id="email" name="email" placeholder="Your Email" required>

        <fieldset>
          <legend>Preferred Contact Method:</legend>
          <label><input type="radio" id="contact-email" name="contact-method" value="email"> Email</label>
          <label><input type="radio" id="contact-phone" name="contact-method" value="phone"> Phone</label>
          <label><input type="radio" id="contact-none" name="contact-method" value="none"> No Preference</label>
        </fieldset>

        <label for="message">Message:</label>
        <textarea id="message" name="message" placeholder="Your Message" required></textarea>

        <label><input type="checkbox" id="newsletter" name="newsletter"> Subscribe to our newsletter</label>

        <button type="submit">Send Message</button>
      </form>
    </section>

    <section class="map-container">
      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d387190.2799145657!2d-74.259865!3d40.697149!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzXCsDQxJzQ2LjAiTiA3NMKwMTUnMzUuMCJX!5e0!3m2!1sen!2sus!4v1580000000000!5m2!1sen!2sus" 
        allowfullscreen 
        loading="lazy" 
        title="White Water Rafting Location">
      </iframe>
    </section>

  </main>

  <footer>
    <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>
    <nav class="socialmedia">
      <a href="#"><img src="images/facebook.svg" alt="Facebook social media link"></a>
      <a href="#"><img src="images/linkedin.svg" alt="LinkedIn social media link"></a>
      <a href="#"><img src="images/instagram.svg" alt="Instagram social media link"></a>
    </nav>
  </footer>

</body>
    </html>
