<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact Us | White Water Rafting Co.</title>

  <meta name="description" content="Contact White Water Rafting Co. for reservations, enquiries, trip planning, and customer support.">
  <meta name="author" content="Magdalene Shehu">

  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<header>
  <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="trips.html">Trips</a>
    <a href="contact.html">Contact Us</a>
  </nav>
</header>

<main>

  <h1>Contact White Water Rafting Co.</h1>

  <!-- CONTACT INFO + MAP -->
  <section class="contact-info">
    <h2>Get in Touch</h2>
    <p><strong>Address:</strong> Abuja, Nigeria</p>
    <p><strong>Phone:</strong> +234 800 000 0000</p>
    <p><strong>Email:</strong> info@whiteraftingco.com</p>

    <iframe
      class="map"
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3939.865...">
    </iframe>
  </section>

  <!-- FORM -->
  <section class="form-section">
    <h2>Send an Enquiry</h2>

    <form>
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" name="fullname">

      <p>Purpose of Message</p>

      <label><input type="radio" id="general" name="purpose" value="general"> General Inquiry</label>
      <label><input type="radio" id="reservation" name="purpose" value="reservation"> Reservation Question</label>
      <label><input type="radio" id="suggestion" name="purpose" value="suggestion"> Website Suggestion</label>

      <label for="message">Message</label>
      <textarea id="message" name="message"></textarea>

      <label>
        <input type="checkbox" id="subscribe" name="subscribe">
        Please subscribe me to the monthly newsletter
      </label>

      <button type="submit">Send Enquiry</button>
    </form>
  </section>

  <!-- EMPLOYEES (MUST BE BELOW FORM) -->
  <section class="team">
    <h2>Our Team</h2>

    <div class="team-grid">
      <figure>
        <img src="images/john.jpeg" alt="John - Senior River Guide">
        <figcaption>John - Senior River Guide</figcaption>
      </figure>

      <figure>
        <img src="images/mary.jpeg" alt="Mary - Safety Coordinator">
        <figcaption>Mary - Safety Coordinator</figcaption>
      </figure>

      <figure>
        <img src="images/alex.jpeg" alt="Alex - Tour Manager">
        <figcaption>Alex - Tour Manager</figcaption>
      </figure>
    </div>
  </section>

</main>

<footer>
  <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>

  <nav class="socialmedia">
    <a href="#"><img src="images/facebook.svg" alt="Facebook social media page"></a>
    <a href="#"><img src="images/linkedin.svg" alt="LinkedIn professional network page"></a>
    <a href="#"><img src="images/instagram.svg" alt="Instagram photo sharing platform"></a>
  </nav>
</footer>

</body>
        </html>
