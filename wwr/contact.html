<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact White Water Rafting Co. for questions, reservations, or suggestions.">
    <meta name="author" content="Magdalene Shehu">
    <title>Contact Us - White Water Rafting Co.</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/z-raftingbw.png" alt="White Water Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us</h1>

        <section class="company-info">
            <h2>Our Office</h2>
            <p><strong>Address:</strong> 123 River Road, Adventure City, AC 56789</p>
            <p><strong>Phone:</strong> (123) 456-7890</p>
            <p><strong>Email:</strong> info@wwrco.com</p>

            <h2>Find Us Here</h2>
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3162.871072091618!2d-122.08424968469224!3d37.42199977982513!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x808fb5e7a9f8c4bd%3A0x408d0b229e6b3b8b!2sGoogleplex!5e0!3m2!1sen!2sus!4v1690163459876!5m2!1sen!2sus"
              width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </section>

        <section class="employees">
            <h2>Meet Our Team</h2>

            <figure>
                <img src="images/z-excitingexpedition.jpg" alt="Our lead guide with rafting guests">
                <figcaption>John Doe - Lead Guide</figcaption>
            </figure>

            <figure>
                <img src="images/cooling-off.jpeg" alt="Our trip coordinator helping guests">
                <figcaption>Jane Smith - Trip Coordinator</figcaption>
            </figure>

            <figure>
                <img src="images/z-wwr-blue.jpg" alt="Our safety officer on the river">
                <figcaption>Mike Brown - Safety Officer</figcaption>
            </figure>
        </section>

        <section class="contact-form">
            <h2>Send Us a Message</h2>
            <form action="#" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <p>Purpose of Message:</p>

                <label for="general">
                    <input type="radio" id="general" name="purpose" value="general" required>
                    General Inquiry
                </label>

                <label for="reservation">
                    <input type="radio" id="reservation" name="purpose" value="reservation">
                    Reservation Question
                </label>

                <label for="website">
                    <input type="radio" id="website" name="purpose" value="website">
                    Website Suggestion
                </label>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <label for="newsletter">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram">
            </a>
        </nav>
    </footer>

</body>

</html>
