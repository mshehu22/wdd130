<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - White Water Rafting Co.</title>
    <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or suggestions.">
    <meta name="author" content="Magdalene Shehu">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/z-raftingbw.png" alt="White Water Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us - White Water Rafting Co.</h1>

        <section class="employees">
            <h2>Meet Our Team</h2>
            <img src="images/employee1.png" alt="Employee placeholder">
            <img src="images/employee2.png" alt="John - Lead River Guide">
            <img src="images/employee3.png" alt="Mary - Trip Coordinator">
            <img src="images/employee4.png" alt="Alex - Safety Officer">
        </section>

        <section class="contact-form">
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name">

                <label for="email">Email:</label>
                <input type="text" id="email" name="email">

                <p>Reason for Contact:</p>
                <label><input type="radio" name="reason" value="question"> Question</label>
                <label><input type="radio" name="reason" value="reservation"> Reservation</label>
                <label><input type="radio" name="reason" value="suggestion"> Suggestion</label>

                <label for="message">Message:</label>
                <textarea id="message" name="message"></textarea>

                <label><input type="checkbox" name="subscribe"> Subscribe to newsletter</label>

                <button type="submit">Send Message</button>
            </form>
        </section>

        <section class="map">
            <h2>Find Us</h2>
            <!-- If you don’t have Google Maps, you can just leave this as placeholder -->
            <p>Map placeholder - visit us at our office location.</p>
        </section>
    </main>

    <footer>
        <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.svg" alt="Facebook social media link"></a>
            <a href="#"><img src="images/linkedin.svg" alt="LinkedIn social media link"></a>
            <a href="#"><img src="images/instagram.svg" alt="Instagram social media link"></a>
        </nav>
    </footer>
</body>
                </html>
