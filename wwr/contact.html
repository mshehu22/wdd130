<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or suggestions.">
  <meta name="author" content="Magdalene Shehu">
  <title>Contact Us - White Water Rafting Co.</title>
  <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
  <header>
    <img src="images/z-raftingbw.png" alt="White Water Rafting Logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="trips.html">Trips</a>
      <a href="contact.html">Contact Us</a>
    </nav>
  </header>

  <main>
    <h1>Contact Us</h1>

    <section class="company-info">
      <p><strong>Address:</strong> 123 Riverbank Road, Bauchi, Nigeria</p>
      <p><strong>Phone:</strong> +234 123 456 7890</p>
      <p><strong>Email:</strong> info@wwraftingco.com</p>
    </section>

    <section class="map">
      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3962.0000!2d9.5000!3d10.2667!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x11aaba0000000000%3A0x0!2sBauchi%2C%20Nigeria!5e0!3m2!1sen!2sus!4v1680635600000!5m2!1sen!2sus"
        width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy">
      </iframe>
    </section>

    <section class="contact-form">
      <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label>Purpose:</label>
        <input type="radio" id="question" name="purpose" value="question">
        <label for="question">Question</label>
        <input type="radio" id="reservation" name="purpose" value="reservation">
        <label for="reservation">Reservation</label>
        <input type="radio" id="suggestion" name="purpose" value="suggestion">
        <label for="suggestion">Suggestion</label>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <input type="checkbox" id="newsletter" name="newsletter">
        <label for="newsletter">Subscribe to newsletter</label>

        <button type="submit">Send Message</button>
      </form>
    </section>

    <section class="employees">
      <h2>Our Team</h2>
      <figure>
        <img src="images/placeholder1.png" alt="Employee 1">
        <figcaption>Employee 1</figcaption>
      </figure>
      <figure>
        <img src="images/placeholder2.png" alt="Employee 2">
        <figcaption>Employee 2</figcaption>
      </figure>
      <figure>
        <img src="images/placeholder3.png" alt="Employee 3">
        <figcaption>Employee 3</figcaption>
      </figure>
    </section>
  </main>

  <footer>
    <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>
    <nav class="socialmedia">
      <a href="#"><img src="images/facebook.svg" alt="Facebook"></a>
      <a href="#"><img src="images/linkedin.svg" alt="LinkedIn"></a>
      <a href="#"><img src="images/instagram.svg" alt="Instagram"></a>
    </nav>
  </footer>
</body>
    </html>
