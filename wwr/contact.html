<!DOCTYPE html>
<html lang="en-US">
<head>

  <meta name="description" content="Contact White Water Rafting for bookings and inquiries.">
  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<header>
  <div class="header-container">

    <div class="logo">
      <img src="images/logo.jpg" alt="Logo">
      <h1>White Water Rafting</h1>
    </div>

    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="trips.html">Trips</a>
      <a href="contact.html">Contact</a>
    </nav>

  </div>
</header>

<main>

<h2 class="page-title">Contact Us</h2>

<section class="grid">

  <!-- CONTACT INFO -->
  <div class="card">
    <h3>Our Address</h3>
    <p>White Water Rafting Company</p>
    <p>Abuja, Nigeria</p>
    <p>Phone: +234 XXX XXX XXXX</p>
    <p>Email: info@rafting.com</p>
  </div>

  <!-- MAP -->
  <div class="card">
    <h3>Find Us</h3>

    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3939.865...">
    </iframe>

  </div>

</section>

<!-- FORM -->
<section class="newsletter">

  <h2>Send Us a Message</h2>

  <form>
    <label>Name</label>
    <input type="text" required>

    <label>Email</label>
    <input type="email" required>

    <label>Message</label>
    <textarea rows="5" required></textarea>

    <button type="submit">Send</button>
  </form>

</section>

</main>

<footer>
  <p>© 2026 White Water Rafting</p>
</footer>

</body>
