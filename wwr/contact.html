<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact Us | White Water Rafting Co.</title>

  <meta name="description" content="Contact White Water Rafting Co. for reservations, enquiries, trip planning, and customer support in Abuja, Nigeria.">
  <meta name="author" content="Magdalene Shehu">

  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<header>
  <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="trips.html">Trips</a>
    <a href="contact.html">Contact Us</a>
  </nav>
</header>

<main>

  <h1>Contact White Water Rafting Co.</h1>

  <div class="contact-container">

    <!-- FORM -->
    <section class="form-section">
      <form>

        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname">

        <p>Preferred Contact Method</p>

        <label><input type="radio" name="contact_method" value="email"> Email</label>
        <label><input type="radio" name="contact_method" value="phone"> Phone</label>
        <label><input type="radio" name="contact_method" value="text"> Text Message</label>

        <label for="message">Message</label>
        <textarea id="message" name="message"></textarea>

        <label>
          <input type="checkbox" id="subscribe" name="subscribe">
          Subscribe to updates
        </label>

        <button type="submit">Send Inquiry</button>

      </form>
    </section>

    <!-- MAP (FIXED - MUST BE FULL EMBED FROM GOOGLE) -->
    <section class="map-section">
      <h2>Our Location</h2>

      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3939.8652369!2d7.4892!3d9.0579!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x104e0b7f5a7c3b1f%3A0x0!2sAbuja%2C%20Nigeria!5e0!3m2!1sen!2sng!4v0000000000"
        loading="lazy">
      </iframe>

    </section>

  </div>

  <!-- TEAM -->
  <section class="team">
    <h2>Our Team</h2>

    <div class="team-grid">

      <figure>
        <img src="images/john.jpeg" alt="John - Senior River Guide at White Water Rafting Co.">
        <figcaption>John</figcaption>
      </figure>

      <figure>
        <img src="images/mary.jpeg" alt="Mary - Safety Coordinator at White Water Rafting Co.">
        <figcaption>Mary</figcaption>
      </figure>

      <figure>
        <img src="images/alex.jpeg" alt="Alex - Tour Manager at White Water Rafting Co.">
        <figcaption>Alex</figcaption>
      </figure>

    </div>
  </section>

</main>

<footer>
  <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>

  <nav class="socialmedia">
    <a href="https://facebook.com"><img src="images/facebook.svg" alt="Facebook social media page"></a>
    <a href="https://linkedin.com"><img src="images/linkedin.svg" alt="LinkedIn professional network page"></a>
    <a href="https://instagram.com"><img src="images/instagram.svg" alt="Instagram photo sharing platform"></a>
  </nav>
</footer>

</body>
       </html>
