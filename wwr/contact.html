<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting Co.</title>
    <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or trip planning.">
    <meta name="author" content="Magdalene Shehu">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us | White Water Rafting Co.</h1>

        <section class="contact-form">
            <form action="#" method="post">
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <p>Preferred Trip:</p>
                <label><input type="radio" id="trip1" name="trip" value="Beginner"> Beginner</label>
                <label><input type="radio" id="trip2" name="trip" value="Intermediate"> Intermediate</label>
                <label><input type="radio" id="trip3" name="trip" value="Advanced"> Advanced</label>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <label><input type="checkbox" id="newsletter" name="newsletter"> Subscribe to our newsletter</label>

                <button type="submit">Send Your Message</button>
            </form>
        </section>

        <section class="team">
            <div class="team-member">
                <img src="images/mary.jpeg" alt="Mary, Trip Coordinator">
                <p>Mary, Trip Coordinator</p>
            </div>
            <div class="team-member">
                <img src="images/john.jpeg" alt="John, Lead River Guide">
                <p>John, Lead River Guide</p>
            </div>
            <div class="team-member">
                <img src="images/alex.jpeg" alt="Alex, Safety Officer">
                <p>Alex, Safety Officer</p>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.svg" alt="Facebook social media link"></a>
            <a href="#"><img src="images/linkedin.svg" alt="LinkedIn social media link"></a>
            <a href="#"><img src="images/instagram.svg" alt="Instagram social media link"></a>
        </nav>
    </footer>
</body>
                           </html>
