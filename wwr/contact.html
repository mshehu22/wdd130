<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | White Water Rafting Co.</title>
  <meta name="description" content="Contact White Water Rafting Co. for reservations, enquiries, trip planning, and customer support.">
  <meta name="author" content="Magdalene Shehu">
  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<header>
  <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="trips.html">Trips</a>
    <a href="contact.html">Contact Us</a>
  </nav>
</header>

<main>
  <h1>Contact White Water Rafting Co.</h1>

  <!-- Employee Profiles -->
  <section class="employees">
    <figure>
      <img src="images/john.jpeg" alt="John - Senior River Guide at White Water Rafting Co.">
      <figcaption>John - Senior River Guide</figcaption>
    </figure>

    <figure>
      <img src="images/mary.jpeg" alt="Mary - Safety Coordinator at White Water Rafting Co.">
      <figcaption>Mary - Safety Coordinator</figcaption>
    </figure>

    <figure>
      <img src="images/alex.jpeg" alt="Alex - Tour Manager at White Water Rafting Co.">
      <figcaption>Alex - Tour Manager</figcaption>
    </figure>
  </section>

  <!-- Contact Form -->
  <section>
    <form>

      <fieldset>
        <legend>Contact Information</legend>

        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address:</label>
        <input type="text" id="email" name="email" required>

      </fieldset>

      <fieldset>
        <legend>Purpose of Message</legend>

        <label for="general">
          <input type="radio" id="general" name="purpose" value="general">
          General Inquiry
        </label>

        <label for="reservation">
          <input type="radio" id="reservation" name="purpose" value="reservation">
          Reservation Question
        </label>

        <label for="website">
          <input type="radio" id="website" name="purpose" value="website">
          Website Suggestion
        </label>

      </fieldset>

      <fieldset>
        <legend>Your Message</legend>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <label for="subscribe">
          <input type="checkbox" id="subscribe" name="subscribe">
          Please subscribe me to the monthly newsletter
        </label>

      </fieldset>

      <button type="submit">Send Message</button>

    </form>
  </section>

</main>

<footer>
  <p>© 2026 White Water Rafting Co. | Magdalene
