<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact Us | White Water Rafting Co.</title>

  <meta name="description" content="Contact White Water Rafting Co. for reservations, enquiries, trip planning, and customer support in Abuja, Nigeria.">
  <meta name="author" content="Magdalene Shehu">

  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<header>
  <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="trips.html">Trips</a>
    <a href="contact.html">Contact Us</a>
  </nav>
</header>

<main>

  <h1>Contact White Water Rafting Co.</h1>

  <!-- FORM -->
  <form>

    <label for="fullname">Full Name</label>
    <input type="text" id="fullname" name="fullname">

    <label for="email">Email</label>
    <input type="text" id="email" name="email">

    <p>Purpose of Message</p>

    <label>
      <input type="radio" id="general" name="purpose" value="general">
      General Inquiry
    </label>

    <label>
      <input type="radio" id="reservation" name="purpose" value="reservation">
      Reservation Question
    </label>

    <label>
      <input type="radio" id="suggestion" name="purpose" value="suggestion">
      Website Suggestion
    </label>

    <label for="message">Message</label>
    <textarea id="message" name="message"></textarea>

    <label>
      <input type="checkbox" id="subscribe" name="subscribe">
      Please subscribe me to the monthly newsletter
    </label>

    <button type="submit">Send Inquiry</button>

  </form>

  <!-- EMPLOYEES -->
  <section>
    <h2>Our Team</h2>

    <figure>
      <img src="images/john.jpeg" alt="John - Senior River Guide at White Water Rafting Co.">
      <figcaption>John - Senior River Guide</figcaption>
    </figure>

    <figure>
      <img src="images/mary.jpeg" alt="Mary - Safety Coordinator at White Water Rafting Co.">
      <figcaption>Mary - Safety Coordinator</figcaption>
    </figure>

    <figure>
      <img src="images/alex.jpeg" alt="Alex - Tour Manager at White Water Rafting Co.">
      <figcaption>Alex - Tour Manager</figcaption>
    </figure>

  </section>

  <!-- MAP (FIXED WORKING VERSION) -->
  <section>
    <h2>Find Us</h2>

    <iframe
      src="https://www.google.com/maps?q=Abuja,Nigeria&output=embed"
      width="100%"
      height="300"
      style="border:0;"
      loading="lazy">
    </iframe>

  </section>

</main>

<footer>

  <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>

  <nav class="socialmedia">
    <a href="#"><img src="images/facebook.svg" alt="Facebook social media page"></a>
    <a href="#"><img src="images/linkedin.svg" alt="LinkedIn professional network page"></a>
    <a href="#"><img src="images/instagram.svg" alt="Instagram photo sharing platform"></a>
  </nav>

</footer>

</body>
  </html>
