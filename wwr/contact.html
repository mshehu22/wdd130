<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or suggestions.">
    <meta name="author" content="Magdalene Shehu">
    <title>Contact Us - White Water Rafting Co.</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/z-raftingbw.png" alt="White Water Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us - White Water Rafting Co.</h1>

        <section class="employees">
            <h2>Meet Our Team</h2>
            <img src="https://via.placeholder.com/150" alt="Employee placeholder" width="150" height="150">
            <img src="https://via.placeholder.com/150" alt="John - Lead River Guide" width="150" height="150">
            <img src="https://via.placeholder.com/150" alt="Mary - Trip Coordinator" width="150" height="150">
            <img src="https://via.placeholder.com/150" alt="Alex - Safety Officer" width="150" height="150">
        </section>

        <form action="#" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name">

            <label for="email">Email:</label>
            <input type="text" id="email" name="email">

            <fieldset>
                <legend>How did you hear about us?</legend>
                <input type="radio" id="friend" name="source" value="friend">
                <label for="friend">Friend</label>
                <input type="radio" id="web" name="source" value="web">
                <label for="web">Website</label>
                <input type="radio" id="social" name="source" value="social">
                <label for="social">Social Media</label>
            </fieldset>

            <label for="message">Message:</label>
            <textarea id="message" name="message"></textarea>

            <input type="checkbox" id="subscribe" name="subscribe">
            <label for="subscribe">Subscribe to newsletter</label>

            <button type="submit">Send Message</button>
        </form>
    </main>

    <footer>
        <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.svg" alt="Facebook social media link"></a>
            <a href="#"><img src="images/linkedin.svg" alt="LinkedIn social media link"></a>
            <a href="#"><img src="images/instagram.svg" alt="Instagram social media link"></a>
        </nav>
    </footer>
</body>
                </html>
