<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact White Water Rafting Co. for reservations, enquiries, trip planning, and customer support.">
  <meta name="author" content="Magdalene Shehu">
  <title>Contact Us | White Water Rafting Co.</title>
  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<header>
  <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="trips.html">Trips</a>
    <a href="contact.html">Contact Us</a>
  </nav>
</header>

<main>
  <h1>Contact White Water Rafting Co.</h1>

  <!-- EMPLOYEES -->
  <section class="employees">
    <figure>
      <img src="images/john.jpeg" alt="John - Senior River Guide at White Water Rafting Co.">
      <figcaption>John - Senior River Guide</figcaption>
    </figure>

    <figure>
      <img src="images/mary.jpeg" alt="Mary - Safety Coordinator at White Water Rafting Co.">
      <figcaption>Mary - Safety Coordinator</figcaption>
    </figure>

    <figure>
      <img src="images/alex.jpeg" alt="Alex - Tour Manager at White Water Rafting Co.">
      <figcaption>Alex - Tour Manager</figcaption>
    </figure>
  </section>

  <!-- CONTACT FORM -->
  <form>
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email Address:</label>
    <input type="text" id="email" name="email" required>

    <p>Purpose of Message:</p>

    <label for="general">
      <input type="radio" id="general" name="purpose" value="general">
      General Inquiry
    </label>

    <label for="reservation">
      <input type="radio" id="reservation" name="purpose" value="reservation">
      Reservation
    </label>

    <label for="feedback">
      <input type="radio" id="feedback" name="purpose" value="feedback">
      Feedback
    </label>

    <label for="message">Message:</label>
    <textarea id="message" name="message"></textarea>

    <label for="subscribe">
      <input type="checkbox" id="subscribe" name="subscribe">
      Subscribe to newsletter
    </label>

    <button type="submit">Send Message</button>
  </form>

  <!-- MAP -->
  <section class="map">
    <iframe 
      src="https://www.google.com/maps?q=Abuja,Nigeria&output=embed"
      allowfullscreen
      loading="lazy">
    </iframe>
  </section>

</main>

<footer>
  <p>© 2026 White Water Rafting Co. | Magdalene Shehu | All rights reserved</p>

  <nav class="socialmedia">
    <a href="#">
      <img src="images/facebook.svg" alt="Facebook social media page">
    </a>
    <a href="#">
      <img src="images/linkedin.svg" alt="LinkedIn professional network page">
    </a>
    <a href="#">
      <img src="images/instagram.svg" alt="Instagram photo sharing platform">
    </a>
  </nav>
</footer>

</body>
      </html>
