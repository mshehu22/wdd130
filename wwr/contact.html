<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or trip planning.">
  <meta name="author" content="Magdalene Shehu">
  <title>Contact Us | White Water Rafting Co.</title>
  <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
  <header>
    <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="trips.html">Trips</a>
      <a href="contact.html">Contact Us</a>
    </nav>
  </header>

  <main>
    <h1>Contact Us | White Water Rafting Co.</h1>

    <form action="#" method="post">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <fieldset>
        <legend>Reason for contact:</legend>
        <label><input type="radio" name="reason" value="question" required> Question</label>
        <label><input type="radio" name="reason" value="reservation"> Reservation</label>
        <label><input type="radio" name="reason" value="feedback"> Feedback</label>
      </fieldset>

      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <label><input type="checkbox" name="newsletter" id="newsletter"> Subscribe to our newsletter</label>

      <button type="submit">Send Message</button>
    </form>

    <h2>Our Location</h2>
    <iframe
      class="map-frame"
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.000000!2d-122.419415!3d37.774929!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80858064!2sSan+Francisco!5e0!3m2!1sen!2sus!4v1234567890"
      allowfullscreen=""
      loading="lazy"
      title="White Water Rafting Co. Location">
    </iframe>
  </main>

  <footer>
    <p>© 2026 White Water Rafting Co. | Magdalene Shehu</p>
    <nav class="socialmedia">
      <a href="#"><img src="images/facebook.svg" alt="Facebook social media link"></a>
      <a href="#"><img src="images/linkedin.svg" alt="LinkedIn social media link"></a>
      <a href="#"><img src="images/instagram.svg" alt="Instagram social media link"></a>
    </nav>
  </footer>
</body>
  </html>
