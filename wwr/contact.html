<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact Us | White Water Rafting Co.</title>

  <meta name="description" content="Contact White Water Rafting Co. for reservations, enquiries, trip planning, and customer support in Abuja, Nigeria.">
  <meta name="author" content="Magdalene Shehu">

  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<header>
  <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="trips.html">Trips</a>
    <a href="contact.html">Contact Us</a>
  </nav>
</header>

<main>

  <h1>Contact White Water Rafting Co.</h1>

  <section class="contact-form">
    <form>

      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" name="fullname">

      <p>Preferred Contact Method</p>

      <!-- FIXED RADIO BUTTONS (THIS FIXES YOUR ERROR) -->

      <input type="radio" id="email" name="contact_method" value="email">
      <label for="email">Email</label>

      <input type="radio" id="phone" name="contact_method" value="phone">
      <label for="phone">Phone</label>

      <input type="radio" id="text" name="contact_method" value="text">
      <label for="text">Text Message</label>

      <label for="message">Message</label>
      <textarea id="message" name="message"></textarea>

      <label>
        <input type="checkbox" id="subscribe" name="subscribe">
        Subscribe to trip updates
      </label>

      <button type="submit">Send Inquiry</button>

    </form>
  </section>

  <section class="team">
    <h2>Our Team</h2>

    <div class="team-grid">

      <figure>
        <img src="images/john.jpeg" alt="John - Senior River Guide at White Water Rafting Co.">
        <figcaption>John</figcaption>
      </figure>

      <figure>
        <img src="images/mary.jpeg" alt="Mary - Safety Coordinator at White Water Rafting Co.">
        <figcaption>Mary</figcaption>
      </figure>

      <figure>
        <img src="images/alex.jpeg" alt="Alex - Tour Manager at White Water Rafting Co.">
        <figcaption>Alex</figcaption>
      </figure>

    </div>
  </section>

  <section class="map">
    <h2>Our Location</h2>

    <iframe
      src="https://www.google.com/maps?q=Abuja%2C%20Nigeria&z=12&output=embed"
      width="100%"
      height="350"
      style="border:0;"
      loading="lazy">
    </iframe>
  </section>

</main>

<footer>
  <p>© 2026 White Water Rafting Co. | Magdalene Shehu | All rights reserved</p>

  <nav class="socialmedia">
    <a href="https://facebook.com">
      <img src="images/facebook.svg" alt="Facebook social media page">
    </a>

    <a href="https://linkedin.com">
      <img src="images/linkedin.svg" alt="LinkedIn professional network page">
    </a>

    <a href="https://instagram.com">
      <img src="images/instagram.svg" alt="Instagram photo sharing platform">
    </a>
  </nav>
</footer>

</body>
        </html>
