<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us | White Water Rafting Co.</title>

    <meta name="description" content="Contact White Water Rafting Co. for questions, reservations, or trip planning.">
    <meta name="author" content="Magdalene Shehu">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<header>
    <img src="images/z-raftingbw.png" alt="White Water Rafting Company logo">

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="trips.html">Trips</a>
        <a href="contact.html">Contact Us</a>
    </nav>
</header>

<main>

    <h1>Contact White Water Rafting Co.</h1>

    <form action="#" method="post">

        <!-- Name -->
        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname">

        <!-- Email -->
        <label for="email">Email:</label>
        <input type="text" id="email" name="email">

        <!-- Trip Type (Radio buttons - exactly 3) -->
        <p>Choose your trip type:</p>

        <label for="basic">
            <input type="radio" id="basic" name="trip" value="basic">
            Basic Rafting
        </label>

        <label for="adventure">
            <input type="radio" id="adventure" name="trip" value="adventure">
            Adventure Rafting
        </label>

        <label for="extreme">
            <input type="radio" id="extreme" name="trip" value="extreme">
            Extreme Rafting
        </label>

        <!-- Message -->
        <label for="message">Message:</label>
        <textarea id="message" name="message"></textarea>

        <!-- Newsletter -->
        <label for="newsletter">
            <input type="checkbox" id="newsletter" name="newsletter">
            Subscribe to newsletter
        </label>

        <!-- Submit Button -->
        <button type="submit">Send Message</button>

    </form>

</main>

<footer>

    <p>
        © 2026 White Water Rafting Co. | Magdalene Shehu
    </p>

    <nav class="socialmedia">
        <a href="https://facebook.com">
            <img src="images/facebook.svg" alt="Visit our Facebook page">
        </a>

        <a href="https://linkedin.com">
            <img src="images/linkedin.svg" alt="Visit our LinkedIn page">
        </a>

        <a href="https://instagram.com">
            <img src="images/instagram.svg" alt="Visit our Instagram page">
        </a>
    </nav>

</footer>

</body>
</html>
