<!DOCTYPE html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>White Water Rafting | Home</title>
  <meta name="description" content="White Water Rafting home page">
  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<header>
  <div class="header-container">

    <div class="logo">
      <img src="images/logo.jpg" alt="White Water Rafting Logo">
      <h1>White Water Rafting Company</h1>
    </div>

    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="trips.html">Trips</a>
      <a href="contact.html">Contact</a>
    </nav>

<!-- HERO -->

    <p>Plan your rafting trip today</p>

    <p>Enjoy amazing river views and nature.</p>
